<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mihomo 全能同步工具 v4.0</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 650px; margin: 20px auto; padding: 0 15px; background: #f4f7f6; color: #333; line-height: 1.6; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        textarea { width: 100%; height: 160px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 13px; margin-bottom: 10px; resize: vertical; font-family: monospace; }
        input { width: 100%; padding: 10px; margin: 5px 0 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; width: 100%; }
        .btn-convert { background: #007bff; color: white; }
        .btn-sync { background: #28a745; color: white; display: none; margin-top: 15px; }
        .btn-save { background: #6c757d; color: white; font-size: 12px; width: auto; padding: 5px 15px; }
        pre { background: #272822; color: #f8f8f2; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 11px; white-space: pre-wrap; word-break: break-all; max-height: 250px; }
        label { font-size: 13px; font-weight: bold; color: #666; }
        .status { font-size: 12px; color: #007bff; margin-top: 8px; display: block; min-height: 1.2em; }
        h2 { text-align: center; color: #2c3e50; }
    </style>
</head>
<body>

    <h2>🚀 节点同步助手 v4.0 <span style="font-size: 12px; background: #eee; padding: 2px 5px; border-radius: 4px;">SS/VLESS/VMESS</span></h2>

    <div class="card">
        <label>GitHub 配置</label>
        <input type="password" id="ghToken" placeholder="GitHub Token">
        <input type="text" id="ghPath" placeholder="私有仓库路径 URL">
        <button class="btn-save" onclick="saveSettings()">保存配置</button>
        <span id="saveStatus" class="status"></span>
    </div>

    <div class="card">
        <label>1. 粘贴链接 (支持 SS / VLESS / VMESS 混合批量)</label>
        <textarea id="nodeInput" placeholder="在此粘贴链接，支持多行混合..."></textarea>
        <button class="btn-convert" onclick="handleConvert()">批量解析</button>
        
        <label style="display:block; margin-top:15px;">2. 预览 (YAML 格式)</label>
        <pre id="yamlPreview">等待解析...</pre>
        
        <button class="btn-sync" id="syncBtn" onclick="handleSync()">3. 智能去重并同步</button>
        <span id="syncStatus" class="status"></span>
    </div>

    <script>
        window.onload = () => {
            document.getElementById('ghToken').value = localStorage.getItem('gh_token') || '';
            document.getElementById('ghPath').value = localStorage.getItem('gh_path') || '';
        };

        function saveSettings() {
            localStorage.setItem('gh_token', document.getElementById('ghToken').value.trim());
            localStorage.setItem('gh_path', document.getElementById('ghPath').value.trim());
            document.getElementById('saveStatus').innerText = '✅ 配置已保存';
            setTimeout(() => document.getElementById('saveStatus').innerText = '', 2000);
        }

        let newNodesArray = [];

        // 强力 Base64 解码逻辑
        function safeAtob(str) {
            try {
                str = str.replace(/-/g, '+').replace(/_/g, '/');
                while (str.length % 4) str += '=';
                return decodeURIComponent(escape(atob(str)));
            } catch (e) { return null; }
        }

        function handleConvert() {
            const input = document.getElementById('nodeInput').value.trim();
            if (!input) return;
            
            const lines = input.split(/[\n\s]+/).filter(l => l.trim().length > 10);
            newNodesArray = [];
            
            lines.forEach((line, index) => {
                try {
                    let node = null;
                    const l = line.trim();

                    // --- 1. 解析 VMESS (Base64 JSON 格式) ---
                    if (l.startsWith('vmess://')) {
                        const rawJson = safeAtob(l.substring(8));
                        if (rawJson) {
                            const v = JSON.parse(rawJson);
                            node = {
                                "name": v.ps || `VMESS_${index}`,
                                "type": "vmess",
                                "server": v.add,
                                "port": parseInt(v.port),
                                "uuid": v.id,
                                "alterId": parseInt(v.aid || 0),
                                "cipher": v.scy || "auto",
                                "udp": true,
                                "tls": v.tls === "tls",
                                "network": v.net || "tcp",
                                "ws-opts": v.net === "ws" ? { "path": v.path || "/", "headers": { "Host": v.host || "" } } : undefined
                            };
                        }
                    } 
                    // --- 2. 解析 SS ---
                    else if (l.startsWith('ss://')) {
                        let name = "SS_Node", main = l.substring(5);
                        if (main.includes('#')) {
                            const p = main.split('#');
                            main = p[0]; name = decodeURIComponent(p[1]);
                        }
                        if (main.includes('@')) {
                            const [auth, serverInfo] = main.split('@');
                            const [server, port] = serverInfo.split(':');
                            const decoded = safeAtob(auth);
                            if (decoded && decoded.includes(':')) {
                                const [cipher, pwd] = decoded.split(':');
                                node = { "name": name, "type": "ss", "server": server, "port": parseInt(port), "cipher": cipher, "password": pwd, "udp": true };
                            }
                        }
                    }
                    // --- 3. 解析 VLESS ---
                    else if (l.startsWith('vless://')) {
                        const url = new URL(l);
                        const params = new URLSearchParams(url.search);
                        node = {
                            "name": decodeURIComponent(url.hash.substring(1)) || `VLESS_${index}`,
                            "type": "vless", "server": url.hostname, "port": parseInt(url.port),
                            "uuid": url.username, "udp": true, "tls": true,
                            "flow": params.get('flow') || "xtls-rprx-vision",
                            "servername": params.get('sni') || "", "network": params.get('type') || "tcp",
                            "reality-opts": { "public-key": params.get('pbk') || "", "short-id": params.get('sid') || "" },
                            "client-fingerprint": params.get('fp') || "chrome"
                        };
                    }

                    if (node) newNodesArray.push(node);
                } catch (e) { console.warn("解析跳过:", line); }
            });

            const preview = document.getElementById('yamlPreview');
            if (newNodesArray.length > 0) {
                preview.innerText = newNodesArray.map(n => `- ${JSON.stringify(n)}`).join('\n');
                document.getElementById('syncBtn').style.display = 'block';
                document.getElementById('syncStatus').innerText = `✅ 解析成功，识别到 ${newNodesArray.length} 个节点`;
            } else {
                preview.innerText = "未识别到任何有效节点";
            }
        }

        async function handleSync() {
            const token = document.getElementById('ghToken').value.replace(/[\n\r\s]/g, '');
            const rawPath = document.getElementById('ghPath').value.trim();
            const statusDiv = document.getElementById('syncStatus');

            let cleanPath = rawPath.replace(/https:\/\/github\.com\//, '').replace(/\/blob\//, '/');
            const p = cleanPath.split('/');
            const owner = p[0], repo = p[1], branch = p[2], filePath = p.slice(3).join('/');
            const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${filePath}`;

            statusDiv.innerText = "⏳ 正在同步并查重...";
            try {
                const getRes = await fetch(`${apiUrl}?ref=${branch}&_t=${Date.now()}`, {
                    headers: { "Authorization": "token " + token }
                });

                let sha = null, existingProxies = [];
                if (getRes.ok) {
                    const data = await getRes.json();
                    sha = data.sha;
                    const raw = decodeURIComponent(escape(atob(data.content)));
                    raw.split('\n').forEach(line => {
                        const s = line.indexOf('{'), e = line.lastIndexOf('}');
                        if (s !== -1 && e !== -1) {
                            try {
                                const obj = JSON.parse(line.substring(s, e + 1));
                                if (obj.server && obj.port) existingProxies.push(obj);
                            } catch(err) {}
                        }
                    });
                }

                const getID = (n) => `${n.server}:${n.port}`;
                const newIDs = newNodesArray.map(getID);
                const filtered = existingProxies.filter(p => !newIDs.includes(getID(p)));
                const final = [...filtered, ...newNodesArray];

                const finalYAML = "proxies:\n" + final.map(p => `  - ${JSON.stringify(p)}`).join("\n");

                const putRes = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: { "Authorization": "token " + token, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: `Update ${newNodesArray.length} nodes`,
                        content: btoa(unescape(encodeURIComponent(finalYAML))),
                        branch: branch,
                        sha: sha || undefined
                    })
                });

                if (putRes.ok) {
                    statusDiv.innerText = `✅ 同步成功！清理重复后现有总数: ${final.length}`;
                    statusDiv.style.color = "#28a745";
                    document.getElementById('nodeInput').value = "";
                } else {
                    const err = await putRes.json();
                    throw new Error(err.message);
                }
            } catch (err) {
                statusDiv.innerText = "❌ 错误: " + err.message;
                statusDiv.style.color = "#dc3545";
            }
        }
    </script>
</body>
</html>
